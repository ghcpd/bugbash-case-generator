server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Azure AD JWT tokens are 2-5KB, default 8k buffers too small
    large_client_header_buffers 4 32k;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Reverse proxy for Azure Batch API (no CORS support in Batch)
    # Frontend sends: /api/batch/{path} with X-Batch-Host header
    location /api/batch/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $batch_host $http_x_batch_host;
        rewrite ^/api/batch/(.*) /$1 break;
        proxy_pass https://$batch_host;
        proxy_set_header Host $batch_host;
        proxy_ssl_server_name on;
        proxy_pass_request_headers on;
        proxy_set_header X-Batch-Host "";

        # Azure AD tokens are large (~2-5KB)
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
    }
}
